  <style>
    /* ========================= TOKENS ========================= */
    :root{--text:#111;--muted:#5a5a5a;--border:rgba(0,0,0,0.12);--white:#fff;--maxw:1120px;--font-display:'Cormorant Garamond',Georgia,serif;--font-body:'Jost',system-ui,sans-serif;}
    *,*::before,*::after{box-sizing:border-box;}
    body{margin:0;font-family:var(--font-body);font-weight:300;line-height:1.6;color:var(--text);background:#fff;overflow-x:hidden;}
    h1,h2,h3{margin:0 0 .5rem;font-family:var(--font-display);font-weight:400;line-height:1.1;letter-spacing:0.01em;}
    p{margin:0 0 1rem;}
    a{color:inherit;text-decoration:none;}
    .skip-link{position:absolute;top:-100%;left:1rem;background:#000;color:#fff;padding:.4rem .8rem;z-index:999;}
    .skip-link:focus{top:.5rem;}
    /* HEADER */
    .site-header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
    .header-inner{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;max-width:var(--maxw);margin-inline:auto;}
    .brand{font-family:var(--font-display);font-size:1.3rem;font-weight:400;letter-spacing:0.04em;color:var(--text);}
    .nav-list{list-style:none;display:flex;gap:1.8rem;padding:0;margin:0;}
    .nav-list a{font-size:.75rem;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);transition:color .2s;}
    .nav-list a:hover{color:var(--text);}
    /* FOOTER */
    .site-footer{padding:1.2rem 2rem;}
    .footer-inner{max-width:var(--maxw);margin-inline:auto;display:flex;justify-content:space-between;align-items:center;}
    .footer-inner p{font-size:.7rem;letter-spacing:0.08em;color:var(--muted);margin:0;}
    .nav-inline{list-style:none;padding:0;margin:0;display:flex;gap:1.2rem;}
    .nav-inline a{font-size:.7rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);transition:color .2s;}
    .nav-inline a:hover{color:var(--text);}
    @media(max-width:640px){.header-inner{flex-direction:column;gap:.75rem;padding:.9rem 1.2rem;}.nav-list{gap:1rem;}}
    .social-bar{padding:3rem 2rem;display:flex;justify-content:center;align-items:center;gap:2.5rem;flex-wrap:wrap;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
    .social-bar a{display:flex;flex-direction:column;align-items:center;gap:.5rem;color:#aaa;transition:color .25s,transform .25s;}
    .social-bar a:hover{color:var(--text);transform:translateY(-4px);text-decoration:none;}
    .social-bar svg{width:24px;height:24px;fill:currentColor;}
  
    /* MOBILE NAV */
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: .4rem;
      flex-direction: column;
      gap: 5px;
    }
    .nav-toggle span {
      display: block;
      width: 22px;
      height: 1px;
      background: var(--text);
      transition: transform .3s, opacity .3s;
    }
    .nav-toggle.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    @media (max-width: 680px) {
      .nav-toggle { display: flex; }
      .site-nav {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(255,255,255,0.97);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 1rem 0;
      }
      .site-nav.open { display: block; }
      .nav-list {
        flex-direction: column;
        gap: 0;
        align-items: stretch;
      }
      .nav-list li a {
        display: block;
        padding: .85rem 2rem;
        font-size: .8rem;
        border-bottom: 1px solid var(--border);
      }
      .nav-list li:last-child a { border-bottom: none; }
      .header-inner { flex-wrap: nowrap; }
      .page-hero { height: 50vw; min-height: 220px; }
      .page-hero-content h1 { font-size: clamp(2rem, 8vw, 4rem); }
      .social-bar { gap: 1.5rem; padding: 2rem 1rem; }
    }
  </style>

    .page-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.28) 0%, rgba(0,0,0,0.62) 100%);
    }
    .page-hero-content {
      position: relative;
      z-index: 1;
      padding: 0 clamp(2rem, 6vw, 6rem) 2.5rem;
    }
    .page-hero-content h1 {
      font-size: clamp(2.4rem, 6vw, 5rem);
      font-weight: 300;
      color: #fff;
      letter-spacing: 0.06em;
      margin: 0;
    }
    .page-hero-content .hero-sub {
      font-size: .75rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin: .4rem 0 0;
    }

    /* SECTION WRAPPER */
    .media-section {
      max-width: var(--maxw);
      margin-inline: auto;
      padding: 4rem 2rem;
    }
    .media-section + .media-section {
      padding-top: 0;
    }

    /* SECTION LABEL */
    .section-label {
      font-size: .7rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: .75rem;
      margin-bottom: 2.5rem;
    }

    /* VIDEO GRID */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .video-item {
      display: flex;
      flex-direction: column;
    }
    .video-wrap {
      position: relative;
      padding-bottom: 56.25%;
      background: #111;
      overflow: hidden;
    }
    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .video-caption {
      font-family: var(--font-display);
      font-size: .95rem;
      font-weight: 300;
      color: var(--text);
    }
    .video-meta {
      font-size: .68rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* AUDIO BAND */
    .audio-band {
      background: #f7f6f4;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .audio-inner {
      max-width: var(--maxw);
      margin-inline: auto;
      padding: 4rem 2rem;
    }
    .soundcloud-wrap {
      margin-top: 1.5rem;
    }
    .soundcloud-wrap iframe {
      width: 100%;
      border: none;
    }

    /* GALLERY */
    .gallery-grid {
      columns: 3;
      column-gap: 1rem;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      overflow: hidden;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform .4s ease, opacity .3s;
      filter: grayscale(8%);
    }
    .gallery-item:hover img {
      transform: scale(1.03);
      opacity: .88;
    }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .lightbox.open {
      display: flex;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      display: block;
    }
    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 1.8rem;
      cursor: pointer;
      line-height: 1;
      transition: color .2s;
    }
    .lightbox-close:hover { color: #fff; }

    /* RESPONSIVE */
    @media (max-width: 700px) {
      .video-grid {
        grid-template-columns: 1fr;
      }
      .gallery-grid {
        columns: 2;
      }
    }
    @media (max-width: 420px) {
      .gallery-grid {
        columns: 1;
      }
    }
  </style>
