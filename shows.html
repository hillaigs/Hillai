    :root {
  --text: #111;
  --muted: #5a5a5a;
  --border: rgba(0,0,0,0.12);
  --white: #fff;
  --maxw: 1120px;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Jost', system-ui, sans-serif;
}

/* =========================
   BASE
========================= */
*, *::before, *::after {
  box-sizing: border-box;
}
body {
  margin: 0;
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.6;
  color: var(--text);
  background: #fff;
  overflow-x: hidden;
}
h1, h2, h3 {
  margin: 0 0 .5rem;
  font-family: var(--font-display);
  font-weight: 400;
  line-height: 1.1;
  letter-spacing: 0.01em;
}
p {
  margin: 0 0 1rem;
}
a {
  color: inherit;
  text-decoration: none;
}
.skip-link {
  position: absolute;
  top: -100%;
  left: 1rem;
  background: #000;
  color: #fff;
  padding: .4rem .8rem;
  z-index: 999;
}
.skip-link:focus {
  top: .5rem;
}

/* =========================
   HEADER
========================= */
.site-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 2rem;
  max-width: var(--maxw);
  margin-inline: auto;
}
.brand {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--text);
}
.nav-list {
  list-style: none;
  display: flex;
  gap: 1.8rem;
  padding: 0;
  margin: 0;
}
.nav-list a {
  font-size: .75rem;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  transition: color .2s;
}
.nav-list a:hover {
  color: var(--text);
}

/* =========================
   FOOTER
========================= */
.site-footer {
  padding: 1.2rem 2rem;
}
.footer-inner {
  max-width: var(--maxw);
  margin-inline: auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-inner p {
  font-size: .7rem;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin: 0;
}
.nav-inline {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  gap: 1.2rem;
}
.nav-inline a {
  font-size: .7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  transition: color .2s;
}
.nav-inline a:hover {
  color: var(--text);
}
.nav-inline {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  gap: 1.2rem;
}
.nav-inline a {
  font-size: .7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  transition: color .2s;
}
.nav-inline a:hover {
  color: var(--text);
}
.social-bar {
      padding: 3rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2.5rem;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .social-bar a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      color: #aaa;
      transition: color .25s, transform .25s;
    }
    .social-bar a:hover {
      color: var(--text);
      transform: translateY(-4px);
      text-decoration: none;
    }
    .social-bar svg { width: 24px; height: 24px; fill: currentColor; }

    /* PAGE HERO */
    .page-hero {
      padding-top: 80px;
      height: 38vh;
      min-height: 240px;
      position: relative;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }
    .page-hero-img {
      position: absolute;
      inset: 0;
      background-image: url("data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEBQAFAAAD/7TlkUGhvdG9zaG9wIDMuMAA4QklNA+0AAAAAABABQAAAAAEAAQFAAAAAAQABOEJJTQQEAAAAAABJHAFaAAMbJUccAgAAAgAEHAI3AAgyMDI0MDgxMxw[...]");
      background-size: cover;
      background-position: center 10%;
    }
    .page-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.28) 0%, rgba(0,0,0,0.62) 100%);
    }
    .page-hero-content {
      position: relative;
      z-index: 1;
      padding: 0 clamp(2rem, 6vw, 6rem) 2.5rem;
    }
    .page-hero-content h1 {
      font-size: clamp(2.4rem, 6vw, 5rem);
      font-weight: 300;
      color: #fff;
      letter-spacing: 0.06em;
      margin: 0;
    }
    .page-hero-content .hero-sub {
      font-size: .75rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin: .4rem 0 0;
    }

    /* SHOWS LAYOUT */
    .shows-section {
      max-width: var(--maxw);
      margin-inline: auto;
      padding: 4rem 2rem 5rem;
    }



    /* Table header */
    .shows-header {
      display: grid;
      grid-template-columns: 110px 1fr 1fr 140px;
      gap: 1rem;
      padding: 0 0 .6rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: .25rem;
    }
    .shows-header span {
      font-size: .65rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Show row */
    .show-row {
      display: grid;
      grid-template-columns: 110px 1fr 1fr 140px;
      gap: 1rem;
      align-items: center;
      padding: 1.1rem 0;
      border-bottom: 1px solid var(--border);
      transition: background .18s;
      animation: fadeUp .4s ease both;
    }
    .show-row:hover {
      background: #f9f8f6;
      margin-inline: -1rem;
      padding-inline: 1rem;
    }
    .show-date { display: flex; flex-direction: column; gap: .05rem; }
    .show-date-day {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 300;
      line-height: 1;
      color: var(--text);
    }
    .show-date-month {
      font-size: .65rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .show-venue-name {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--text);
      display: block;
      margin-bottom: .15rem;
    }
    .show-details {
      font-size: .72rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .show-location {
      font-size: .75rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .show-action { text-align: right; }
    .btn-ticket {
      display: inline-block;
      padding: .42rem 1.1rem;
      border: 1px solid rgba(0,0,0,0.22);
      font-family: var(--font-body);
      font-size: .65rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      transition: background .2s, color .2s;
    }
    .btn-ticket:hover { background: var(--text); color: #fff; text-decoration: none; }

    /* Past shows muted */
    .show-row.past .show-date-day,
    .show-row.past .show-venue-name { color: #999; }
    .show-row.past .show-date-month,
    .show-row.past .show-details,
    .show-row.past .show-location { color: #bbb; }

    .shows-empty {
      padding: 4rem 0;
      text-align: center;
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-style: italic;
      color: var(--muted);
    }
    #no-results { display: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }



    @media (max-width: 700px) {
      .shows-header { display: none; }
      .show-row {
        grid-template-columns: 70px 1fr;
        grid-template-rows: auto auto;
        gap: .4rem 1rem;
      }
      .show-date { grid-row: 1 / 3; }
      .show-location { grid-column: 2; font-size: .7rem; }
      .show-action { grid-column: 2; text-align: left; margin-top: .25rem; }
    }
  
    /* MOBILE NAV */
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: .4rem;
      flex-direction: column;
      gap: 5px;
    }
    .nav-toggle span {
      display: block;
      width: 22px;
      height: 1px;
      background: var(--text);
      transition: transform .3s, opacity .3s;
    }
    .nav-toggle.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    @media (max-width: 680px) {
      .nav-toggle { display: flex; }
      .site-nav {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(255,255,255,0.97);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 1rem 0;
      }
      .site-nav.open { display: block; }
      .nav-list {
        flex-direction: column;
        gap: 0;
        align-items: stretch;
      }
      .nav-list li a {
        display: block;
        padding: .85rem 2rem;
        font-size: .8rem;
        border-bottom: 1px solid var(--border);
      }
      .nav-list li:last-child a { border-bottom: none; }
      .header-inner { flex-wrap: nowrap; }
      .page-hero { height: 50vw; min-height: 220px; }
      .page-hero-content h1 { font-size: clamp(2rem, 8vw, 4rem); }
      .social-bar { gap: 1.5rem; padding: 2rem 1rem; }
    }

    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const days   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const now    = new Date(); now.setHours(0,0,0,0);

    function isPast(show) { return show.date < now; }

    function renderShows(filter) {
      const list = document.getElementById('shows-list');
      const noResults = document.getElementById('no-results');
      list.innerHTML = '';

      let filtered = shows.slice().sort((a, b) => a.date - b.date);

      if (filter === 'upcoming') {
        filtered = filtered.filter(s => !isPast(s));
      } else if (filter === 'past') {
        filtered = filtered.filter(s => isPast(s)).reverse();
      } else {
        const upcoming = filtered.filter(s => !isPast(s));
        const past = filtered.filter(s => isPast(s)).reverse();
        filtered = [...upcoming, ...past];
      }

      if (!filtered.length) { noResults.style.display = 'block'; return; }
      noResults.style.display = 'none';

      filtered.forEach((show, i) => {
        const past = isPast(show);
        const row = document.createElement('div');
        row.className = 'show-row' + (past ? ' past' : '');
        row.setAttribute('role', 'listitem');
        row.style.animationDelay = `${i * 35}ms`;

        const dayNum   = show.date.getDate().toString().padStart(2, '0');
        const monthStr = months[show.date.getMonth()];
        const yearStr  = show.date.getFullYear();
        const dowStr   = days[show.date.getDay()];

        const detailLine = show.personnel
          ? `${dowStr} · ${show.time}<br><span style="font-size:.68rem;color:#aaa">${show.personnel}</span>`
          : `${dowStr} · ${show.time}`;

        const actionHtml = (!past && show.url)
          ? `<a class="btn-ticket" href="${show.url}" target="_blank" rel="noopener">Info</a>`
          : '';

        row.innerHTML = `
          <div class="show-date">
            <span class="show-date-day">${dayNum}</span>
            <span class="show-date-month">${monthStr} ${yearStr}</span>
          </div>
          <div class="show-venue">
            <span class="show-venue-name">${show.title} @${show.venue}</span>
            <span class="show-details">${detailLine}</span>
          </div>
          <div class="show-location">${show.city}</div>
          <div class="show-action">${actionHtml}</div>
        `;
        list.appendChild(row);
      });
    }

    renderShows('all');

  </script>

  <script>
    document.getElementById('year') && (document.getElementById('year').textContent = new Date().getFullYear());
    const toggle = document.getElementById('nav-toggle');
    const nav = document.getElementById('site-nav');
    if (toggle && nav) {
      toggle.addEventListener('click', () => {
        toggle.classList.toggle('open');
        nav.classList.toggle('open');
      });
      // Close nav when a link is clicked
      nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
        toggle.classList.remove('open');
        nav.classList.remove('open');
      }));
    }
  </script>
